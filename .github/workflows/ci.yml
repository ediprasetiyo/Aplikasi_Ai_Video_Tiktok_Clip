name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node (web + api + shared)
    runs-on: ubuntu-latest
    env:
      # Required for any module that imports env.ts at build time.
      # Values are CI-only placeholders, never real secrets.
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:dev@localhost:5432/tiktok_clip
      AUTH_SECRET: ci-only-secret-32-bytes-minimum-length-xxxx
      AUTH_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
      INTERNAL_API_SECRET: ci-internal-secret-min-16chars
      API_BASE_URL: http://localhost:4000
      REDIS_URL: redis://localhost:6379
      R2_ENDPOINT: http://localhost:9000
      R2_ACCESS_KEY_ID: minioadmin
      R2_SECRET_ACCESS_KEY: minioadmin
      R2_BUCKET: tiktok-clips
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      SMTP_FROM: ci@tiktok-clip.local
    steps:
      - uses: actions/checkout@v4

      # Reads pnpm version from package.json "packageManager" field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  python:
    name: Python worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Test (pytest)
        run: uv run pytest -q
